name: Resize PFPs

on:
  push:
    branches: [main]
    paths:
      - 'pfps/**'
  workflow_dispatch:

concurrency:
  group: resize-pfps
  cancel-in-progress: true

jobs:
  resize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect or install ImageMagick
        id: im
        run: |
          if command -v magick &>/dev/null; then
            echo "bin=magick" >> $GITHUB_OUTPUT
          elif command -v convert &>/dev/null; then
            echo "bin=convert" >> $GITHUB_OUTPUT
          else
            echo "Installing ImageMagick..."
            sudo apt-get update
            sudo apt-get install -y imagemagick
            if command -v magick &>/dev/null; then
              echo "bin=magick" >> $GITHUB_OUTPUT
            elif command -v convert &>/dev/null; then
              echo "bin=convert" >> $GITHUB_OUTPUT
            else
              echo "::error::ImageMagick not found after install"
              exit 1
            fi
          fi

      - name: Parse config from pfps/CONVERSION_MAP.toml
        id: config
        run: |
          python3 - << 'PYEOF'
          import os
          import tomllib
          
          with open('pfps/CONVERSION_MAP.toml', 'rb') as f:
              cfg = tomllib.load(f)
          
          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
              out.write(f"source_res={cfg['source_res']}\n")
              out.write(f"output_reses={' '.join(map(str, cfg['output_reses']))}\n")
          PYEOF

      - name: Sync PFP resolutions
        env:
          IM: ${{ steps.im.outputs.bin }}
          SOURCE_RES: ${{ steps.config.outputs.source_res }}
          OUTPUT_RESES_STR: ${{ steps.config.outputs.output_reses }}
        run: |
          set -euo pipefail

          PFP_DIR="pfps"
          read -ra OUTPUT_RESES <<< "$OUTPUT_RESES_STR"
          FULL_VALID_LIST="$SOURCE_RES ${OUTPUT_RESES[*]}"

          echo "=== Configuration ==="
          echo "Source resolution: $SOURCE_RES"
          echo "Output resolutions: ${OUTPUT_RESES[*]}"
          echo "Valid resolutions (kept): $FULL_VALID_LIST"
          echo "ImageMagick binary: $IM"
          echo ""

          cd "$PFP_DIR"

          generated=0
          deleted=0

          # ── Step 1: Generate missing variants from source-resolution images ──
          echo "=== Step 1: Generating missing variants ==="
          for f in *.png; do
              [[ -f "$f" ]] || continue
              base="${f%.png}"

              if [[ ! "$base" =~ ^pfp_(([a-z]+)_)?([0-9]+)(tp)?$ ]]; then
                  continue
              fi

              variant="${BASH_REMATCH[2]}"
              res="${BASH_REMATCH[3]}"
              tp="${BASH_REMATCH[4]}"

              [[ -z "$res" ]] && continue

              if [[ "$res" != "$SOURCE_RES" ]]; then
                  continue
              fi

              for target_res in "${OUTPUT_RESES[@]}"; do
                  if [[ -n "$variant" ]]; then
                      target="pfp_${variant}_${target_res}${tp:+tp}.png"
                  else
                      target="pfp_${target_res}${tp:+tp}.png"
                  fi

                  if [[ ! -f "$target" ]]; then
                      echo "  Generating: $target (from $f)"
                      "$IM" "$f" -filter point -resize "${target_res}x${target_res}" "$target"
                      ((generated++)) || true
                  fi
              done
          done

          # ── Step 2: Delete PNGs whose resolution isn't valid ──
          echo ""
          echo "=== Step 2: Deleting invalid-resolution PNGs ==="
          for f in *.png; do
              [[ -f "$f" ]] || continue
              base="${f%.png}"

              if [[ ! "$base" =~ ^pfp_(([a-z]+)_)?([0-9]+)(tp)?$ ]]; then
                  continue
              fi

              res="${BASH_REMATCH[3]}"
              [[ -z "$res" ]] && continue

              found=false
              for vr in $FULL_VALID_LIST; do
                  if [[ "$res" == "$vr" ]]; then
                      found=true
                      break
                  fi
              done

              if [[ "$found" == "false" ]]; then
                  echo "  Deleting: $f (resolution $res not in valid list)"
                  rm "$f"
                  ((deleted++)) || true
              fi
          done

          # ── Step 3: Orphan cleanup — delete variants whose source is gone ──
          echo ""
          echo "=== Step 3: Cleaning up orphans ==="
          for f in *.png; do
              [[ -f "$f" ]] || continue
              base="${f%.png}"

              if [[ ! "$base" =~ ^pfp_(([a-z]+)_)?([0-9]+)(tp)?$ ]]; then
                  continue
              fi

              variant="${BASH_REMATCH[2]}"
              tp="${BASH_REMATCH[4]}"

              if [[ -n "$variant" ]]; then
                  source_img="pfp_${variant}_${SOURCE_RES}${tp:+tp}.png"
              else
                  source_img="pfp_${SOURCE_RES}${tp:+tp}.png"
              fi

              if [[ ! -f "$source_img" ]]; then
                  echo "  Deleting: $f (orphan — source $source_img missing)"
                  rm "$f"
                  ((deleted++)) || true
              fi
          done

          echo ""
          echo "::notice::Generated $generated, deleted $deleted"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pfps/
          if git diff --cached --quiet; then
              echo "Nothing to do — all resolutions are up to date."
          else
              git commit -m "chore(pfps): auto-sync resolutions"
              git push
          fi
