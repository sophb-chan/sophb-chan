name: Resize PFPs

on:
  push:
    branches: [main]
    paths:
      - 'pfps/**'
  workflow_dispatch:

concurrency:
  group: resize-pfps
  cancel-in-progress: true

jobs:
  resize:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect or install ImageMagick
        id: im
        run: |
          if command -v magick &>/dev/null; then
            echo "bin=magick" >> $GITHUB_OUTPUT
          elif command -v convert &>/dev/null; then
            echo "bin=convert" >> $GITHUB_OUTPUT
          else
            echo "Installing ImageMagick..."
            sudo apt-get update
            sudo apt-get install -y imagemagick
            if command -v magick &>/dev/null; then
              echo "bin=magick" >> $GITHUB_OUTPUT
            elif command -v convert &>/dev/null; then
              echo "bin=convert" >> $GITHUB_OUTPUT
            else
              echo "::error::ImageMagick not found after install"
              exit 1
            fi
          fi

      - name: Parse config from pfps/CONVERSION_MAP.toml
        id: config
        shell: python
        run: |
          import tomllib
          with open('pfps/CONVERSION_MAP.toml', 'rb') as f:
              cfg = tomllib.load(f)
          
          print(f"source_res={cfg['source_res']}")
          print(f"output_reses={' '.join(map(str, cfg['output_reses']))}")

      - name: Sync PFP resolutions
        run: |
          set -euo pipefail

          # ── Config ────────────────────────────────────────
          PFP_DIR="pfps"
          SOURCE_RES=${{ steps.config.outputs.source_res }}
          read -ra OUTPUT_RESES <<< "${{ steps.config.outputs.output_reses }}"
          IM="${{ steps.im.outputs.bin }}"
          # Build valid resolutions string for grep checking
          VALID_RES="$SOURCE_RES ${OUTPUT_RESES[*]}"
          # ──────────────────────────────────────────────────

          cd "$PFP_DIR"

          generated=0
          deleted=0

          # ── Step 1: Generate missing variants from source-resolution images ──
          for f in *.png; do
            [[ -f "$f" ]] || continue
            base="${f%.png}"

            if [[ ! "$base" =~ ^pfp_(([a-z]+)_)?([0-9]+)(tp)?$ ]]; then
              continue
            fi

            variant="${BASH_REMATCH[2]}"
            res="${BASH_REMATCH[3]}"
            tp="${BASH_REMATCH[4]}"

            # Only operate from source-resolution images
            if [[ "$res" != "$SOURCE_RES" ]]; then
              continue
            fi

            for target_res in "${OUTPUT_RESES[@]}"; do
              if [[ -n "$variant" ]]; then
                target="pfp_${variant}${tp:+_}${target_res}${tp:+tp}.png"
              else
                target="pfp_${target_res}${tp:+tp}.png"
              fi

              if [[ ! -f "$target" ]]; then
                echo "Generating: $target (from $f)"
                "$IM" "$f" -filter point -resize "${target_res}x${target_res}" "$target"
                ((generated++)) || true
              fi
            done
          done

          # ── Step 2: Delete PNGs whose resolution isn't valid ──
          for f in *.png; do
            [[ -f "$f" ]] || continue
            base="${f%.png}"

            if [[ ! "$base" =~ ^pfp_(([a-z]+)_)?([0-9]+)(tp)?$ ]]; then
              continue
            fi

            res="${BASH_REMATCH[3]}"

            # Check if res is in VALID_RES using grep
            if ! echo "$VALID_RES" | grep -qw "^$res$"; then
              echo "Deleting: $f (resolution $res not in valid list)"
              rm "$f"
              ((deleted++)) || true
            fi
          done

          # ── Step 3: Orphan cleanup — delete variants whose source is gone ──
          for f in *.png; do
            [[ -f "$f" ]] || continue
            base="${f%.png}"

            if [[ ! "$base" =~ ^pfp_(([a-z]+)_)?([0-9]+)(tp)?$ ]]; then
              continue
            fi

            variant="${BASH_REMATCH[2]}"

            if [[ -n "$variant" ]]; then
              source_img="pfp_${variant}${SOURCE_RES}.png"
            else
              source_img="pfp_${SOURCE_RES}.png"
            fi

            if [[ ! -f "$source_img" ]]; then
              echo "Deleting: $f (orphan — source $source_img missing)"
              rm "$f"
              ((deleted++)) || true
            fi
          done

          echo ""
          echo "::notice::Generated $generated, deleted $deleted"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pfps/
          if git diff --cached --quiet; then
            echo "Nothing to do — all resolutions are up to date."
          else
            git commit -m "chore(pfps): auto-sync resolutions"
            git push
          fi
